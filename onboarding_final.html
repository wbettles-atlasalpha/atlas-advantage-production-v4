<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Advantage — Final Step</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #B08F35;
      --navy: #0A192F;
      --bg: #FFFFFF;
      --bg-2: #F8F9FB;
      --border: #E6E9EF;
      --text: var(--navy);
      --text-muted: #4A5568;
    }

    body {
      background: var(--bg-2);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .onboarding-card {
      background: #FFF;
      width: 100%;
      max-width: 500px;
      padding: 3.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px -15px rgba(2, 12, 27, 0.07);
    }

    .step-indicator {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .step-dot { flex: 1; height: 3px; background: var(--border); }
    .step-dot.active { background: var(--gold); }

    h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }

    .summary-box {
      background: var(--bg-2);
      padding: 1.5rem;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
    }
    .summary-label { font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .summary-value { font-weight: 800; color: var(--navy); }

    .btn-final {
      width: 100%;
      padding: 1.1rem;
      background: var(--gold);
      color: #FFF;
      border: none;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-top: 1rem;
    }

    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="onboarding-card">
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
    </div>

    <h1>Finalise Your Territory</h1>
    <p>Review your selection and proceed to secure checkout via Stripe to start your 14-day free trial.</p>

    <div class="summary-box">
      <div class="summary-item">
        <span class="summary-label">Trade</span>
        <span class="summary-value">Electrical Contractor</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Region</span>
        <span class="summary-value">Melbourne Metro</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Seats</span>
        <span class="summary-value">5 Credits Used</span>
      </div>
      <div class="summary-item" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
        <span class="summary-label">Total Today</span>
        <span class="summary-value" style="color: var(--gold); font-size: 1.1rem;">$0.00</span>
      </div>
    </div>

    <button class="btn-final" onclick="window.location.href='https://buy.stripe.com/5kQ6oG45x7fb2NacxQ2kw00'">Secure Territory & Start Trial</button>

    <div class="security-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      SECURE STRIPE CHECKOUT
    </div>
  </div>

</body>
</html>
