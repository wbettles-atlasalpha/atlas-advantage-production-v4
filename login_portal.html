<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atlas Advantage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-10 text-blue-500">Atlas Advantage | Partner Portal</h1>
        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Active Pipeline</p>
                <h2 class="text-3xl font-bold">14</h2>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Outreach Sent</p>
                <h2 class="text-3xl font-bold">12</h2>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Meetings Booked</p>
                <h2 class="text-3xl font-bold text-green-500">3</h2>
            </div>
        </div>
        <table class="w-full bg-slate-900 rounded-xl overflow-hidden">
            <thead class="bg-slate-800 text-xs uppercase">
                <tr>
                    <th class="p-4 text-left">Business</th>
                    <th class="p-4 text-left">Signal</th>
                    <th class="p-4 text-left">Status</th>
                    <th class="p-4 text-left">Action</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <tr class="border-t border-slate-800">
                    <td class="p-4">Fitzroy Espresso</td>
                    <td class="p-4">DA Lodged</td>
                    <td class="p-4 text-blue-400">Outreach Sent</td>
                    <td class="p-4"><button class="text-blue-500 underline">View</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
